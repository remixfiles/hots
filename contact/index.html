<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact HOTS | Get in Touch</title>
  <link rel="stylesheet" href="/css/components.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%239f1239'/%3E%3Ctext x='50' y='68' font-family='Georgia,serif' font-size='52' fill='white' text-anchor='middle' font-weight='bold'%3EH%3C/text%3E%3C/svg%3E">
  <script src="/js/components.js" defer></script>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main class="container section" style="max-width: 680px;">
    <h1 style="margin-bottom: 1rem;">Contact Us</h1>
    <p style="margin-bottom: 2rem; color: var(--text-muted);">For press inquiries, corrections, story tips, or partnership proposals.</p>
    
    <form onsubmit="event.preventDefault(); alert('Thank you. Your message has been received. Our team will respond within 48 hours.'); this.reset();">
      <div style="margin-bottom:1rem;">
        <label style="display:block; margin-bottom:0.35rem; font-weight:600;">Your Name</label>
        <input type="text" required style="width:100%; padding:0.75rem; border:1px solid var(--border); background:var(--card-bg); color:var(--text);">
      </div>
      <div style="margin-bottom:1rem;">
        <label style="display:block; margin-bottom:0.35rem; font-weight:600;">Email Address</label>
        <input type="email" required style="width:100%; padding:0.75rem; border:1px solid var(--border); background:var(--card-bg); color:var(--text);">
      </div>
      <div style="margin-bottom:1rem;">
        <label style="display:block; margin-bottom:0.35rem; font-weight:600;">Subject</label>
        <input type="text" required style="width:100%; padding:0.75rem; border:1px solid var(--border); background:var(--card-bg); color:var(--text);">
      </div>
      <div style="margin-bottom:1.5rem;">
        <label style="display:block; margin-bottom:0.35rem; font-weight:600;">Message</label>
        <textarea required rows="6" style="width:100%; padding:0.75rem; border:1px solid var(--border); background:var(--card-bg); color:var(--text); resize:vertical;"></textarea>
      </div>
      <button type="submit" style="background:var(--accent); color:white; padding:0.85rem 2.25rem; border:none; font-weight:600; cursor:pointer;">Send Message</button>
    </form>
    
    <p style="margin-top:2.5rem; font-size:0.9rem; color:var(--text-muted);">Editorial tips: tips@hots.weirdhub.site &nbsp;•&nbsp; General: hello@hots.weirdhub.site</p>
  </main>

  <div id="footer-placeholder"></div>
</body>
</html>
